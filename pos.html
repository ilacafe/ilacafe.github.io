<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>ILA | POS</title>
    <link rel="apple-touch-icon" href="/icon.png" />
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;700&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

    <style>
        :root { --brand-bg: #8D6E52; --brand-text: #ffffff; }
        #login-overlay { position: fixed; inset: 0; background: var(--brand-bg); z-index: 99999; display: flex; align-items: center; justify-content: center; padding: 20px; }
        #login-overlay.hidden { display: none; }
        #login-box { width: 100%; max-width: 320px; text-align: center; }
        #login-box h2 { letter-spacing: 3px; text-transform: uppercase; font-weight: 700; margin-bottom: 25px; }
        #login-box input { width: 100%; padding: 14px; margin: 8px 0; border-radius: 8px; border: 1px solid rgba(255,255,255,0.4); background: transparent; color: #fff; font-family: 'Quicksand', sans-serif; font-size: 1rem; box-sizing: border-box; outline: none; }
        #login-box button { width: 100%; padding: 14px; margin-top: 16px; border: none; border-radius: 8px; background: #fff; color: var(--brand-bg); font-weight: 700; font-size: 1.1rem; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; font-family: 'Quicksand', sans-serif; }
        #login-error { color: #ffcfcf; font-size: 0.9rem; margin-top: 12px; min-height: 1.2em; }
        body { background-color: var(--brand-bg); color: var(--brand-text); font-family: 'Quicksand', sans-serif; margin: 0; padding: 0; line-height: 1.6; display: flex; flex-direction: column; align-items: center; padding-bottom: 120px; }
        .container { width: 90%; max-width: 600px; margin: 0 auto; padding: 20px; }
        header { text-align: center; margin-bottom: 25px; }
        .logo { max-width: 350px; height: auto; display: block; margin: 0 auto; }

        /* 5-ITEM DASHBOARD - Tuned to fit perfectly on mobile */
        .dashboard-bar { border: 1px solid rgba(255, 255, 255, 0.2); padding: 15px 10px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .dash-stat { display: flex; flex-direction: column; align-items: center; cursor: pointer; flex: 1; transition: opacity 0.2s; }
        .dash-stat:active { opacity: 0.5; }
        .dash-label { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 1px; opacity: 0.7; margin-bottom: 2px; font-weight: bold; }
        .dash-value { font-size: 1rem; font-weight: 700; }
        .dash-divider { width: 1px; height: 25px; background-color: rgba(255, 255, 255, 0.2); }

                /* NEW: Crisp Web Order Border Pulse */
        @keyframes crispBorderPulse {
            0% { box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0); background-color: transparent; }
            50% { box-shadow: inset 0 0 0 1.5px rgba(255, 255, 255, 1); background-color: rgba(255, 255, 255, 0.05); }
            100% { box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0); background-color: transparent; }
        }
        .pulse-alert {
            animation: crispBorderPulse 1.5s infinite ease-in-out;
            border-radius: 6px;
        }


        h2 { font-weight: 700; font-size: 1.2rem; text-transform: uppercase; letter-spacing: 2px; text-align: center; margin-top: 20px; margin-bottom: 20px; border-bottom: 1px solid rgba(255, 255, 255, 0.2); padding-bottom: 10px; }
        
        .menu-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; font-size: 1.1rem; font-weight: 500; }
        .item-name { flex-grow: 1; }
        
        .coffee-header { display: grid; grid-template-columns: 2fr 1fr 1fr; font-weight: bold; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 15px; opacity: 0.6; border-bottom: 1px dashed rgba(255, 255, 255, 0.2); padding-bottom: 5px; }
        .coffee-row { display: grid; grid-template-columns: 2fr 1fr 1fr; align-items: center; margin-bottom: 15px; font-size: 1.1rem; font-weight: 500; }
        
        .swap-container { display: flex; justify-content: flex-end; align-items: center; min-width: 76px; height: 32px; }
        
        .add-btn { background-color: transparent; color: var(--brand-text); border: 1px solid rgba(255, 255, 255, 0.4); border-radius: 4px; width: 32px; height: 32px; font-size: 1.4rem; font-weight: 400; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; padding: 0; }
        .add-btn:active { background-color: var(--brand-text); color: var(--brand-bg); }
        .add-btn:disabled { opacity: 0.2; cursor: not-allowed; border-color: transparent; }

        .qty-ctrl { display: flex; align-items: center; border: 1px solid rgba(255,255,255,0.4); border-radius: 4px; height: 32px; box-sizing: border-box; }
        .qty-btn { background: transparent; color: white; border: none; width: 26px; height: 100%; font-size: 1.2rem; cursor: pointer; display: flex; align-items: center; justify-content: center; padding: 0; transition: all 0.2s; line-height: 1; }
        .qty-btn:active { background: white; color: var(--brand-bg); }
        .qty-num { width: 24px; text-align: center; font-weight: bold; font-size: 1.1rem; }

        .sold-out-badge { font-size: 0.65rem; color: rgba(255,255,255,0.5); border: 1px solid rgba(255,255,255,0.3); padding: 2px 6px; border-radius: 4px; margin-left: 8px; text-transform: uppercase; font-weight: bold; }

        #cart-banner { position: fixed; bottom: 0; left: 0; width: 100%; background-color: var(--brand-text); color: var(--brand-bg); padding: 15px 20px calc(15px + env(safe-area-inset-bottom)); box-sizing: border-box; display: flex; justify-content: space-between; align-items: center; border-top: 1px solid rgba(0,0,0,0.1); transform: translateY(100%); transition: transform 0.3s ease; z-index: 1000; }
        #cart-banner.visible { transform: translateY(0); }
        .cart-info { display: flex; flex-direction: column; cursor: pointer; }
        .cart-total { font-weight: 700; font-size: 1.1rem; }
        .cart-clear { font-size: 0.8rem; opacity: 0.7; }
        .checkout-btn { background-color: var(--brand-bg); color: var(--brand-text); border: none; padding: 10px 20px; border-radius: 6px; font-weight: bold; font-size: 0.9rem; font-family: 'Quicksand', sans-serif; cursor: pointer; text-transform: uppercase; letter-spacing: 1px;}

        #notification-area { position: fixed; top: 15px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 350px; z-index: 3000; pointer-events: none; }
        
        .toast-card { background: white; color: #8D6E52; padding: 20px; border-radius: 4px; box-shadow: 0 10px 30px rgba(0,0,0,0.4); margin-bottom: 10px; font-family: 'Quicksand', sans-serif; display: flex; flex-direction: column; pointer-events: auto; animation: slideDown 0.3s ease-out; border-left: 5px solid #8D6E52; }
        .toast-header { font-weight: 700; font-size: 1rem; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 6px; }
        .toast-details { font-size: 0.95rem; opacity: 0.9; margin-bottom: 15px; font-weight: 500; line-height: 1.4; }
        .toast-btn { background: transparent; color: #8D6E52; border: 1px solid #8D6E52; padding: 8px 0; border-radius: 4px; font-weight: bold; font-size: 0.8rem; cursor: pointer; text-transform: uppercase; width: 100%; transition: background 0.2s; }
        .toast-btn:active { background: #f0f0f0; }

        @keyframes slideDown { from { transform: translateY(-20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.8); display: flex; justify-content: center; align-items: flex-start; padding-top: 5vh; box-sizing: border-box; z-index: 2000; opacity: 0; pointer-events: none; transition: opacity 0.3s ease; }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }
        .modal-content { background-color: var(--brand-bg); border: 1px solid rgba(255,255,255,0.2); padding: 25px 20px; border-radius: 12px; text-align: center; width: 85%; max-width: 400px; max-height: 85vh; overflow-y: auto; }
        .modal-content h3 { margin-top: 0; font-size: 1.2rem; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 1px;}
        
        .remark-input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 6px; border: 1px solid rgba(255,255,255,0.4); font-family: 'Quicksand', sans-serif; font-size: 1rem; background-color: transparent; color: white; display: block; box-sizing: border-box; outline: none;}
        .remark-input::placeholder { color: rgba(255,255,255,0.4); }
        
        .choice-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 8px; }
        .choice-btn { background: transparent; border: 1px solid rgba(255,255,255,0.4); color: white; padding: 12px 5px; border-radius: 6px; font-family: 'Quicksand', sans-serif; font-size: 0.9rem; text-transform: uppercase; cursor: pointer; font-weight: bold; transition: all 0.2s; flex: 1;}
        .choice-btn.selected { background: white; color: var(--brand-bg); border-color: white;}
        
        .table-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin: 20px 0; }
        .table-btn { background-color: transparent; color: var(--brand-text); border: 1px solid rgba(255,255,255,0.4); padding: 15px 0; border-radius: 6px; font-weight: bold; font-size: 1.1rem; cursor: pointer; font-family: 'Quicksand', sans-serif; }
        .table-btn.occupied { background-color: #ffffff; color: #8D6E52; border: none;}
        .takeaway-btn { background-color: transparent; color: white; border: 1px solid rgba(255,255,255,0.4); padding: 15px 0; border-radius: 6px; font-weight: bold; font-size: 1rem; cursor: pointer; font-family: 'Quicksand', sans-serif; width: 100%; margin-bottom: 15px; text-transform: uppercase; transition: all 0.2s;}
        .takeaway-btn:active { background: white; color: var(--brand-bg); }

        .modal-buttons { display: flex; gap: 10px; justify-content: center; margin-top: 15px; margin-bottom: 15px; }
        .upi-status { min-height: 22px; font-size: 0.95rem; font-weight: 700; margin: 6px 0 2px; text-align: center; }
        .upi-status.waiting { color: #8a6d3b; animation: upiPulse 1.2s ease-in-out infinite; }
        .upi-status.verified { color: #1b7f3b; }
        @keyframes upiPulse { 0%,100%{opacity:1;} 50%{opacity:0.4;} }
        .btn { padding: 12px 15px; border-radius: 6px; font-weight: bold; font-size: 0.95rem; cursor: pointer; font-family: 'Quicksand', sans-serif; flex: 1; text-transform: uppercase; letter-spacing: 1px; border: none;}
        .btn-primary { background-color: var(--brand-text); color: var(--brand-bg); }
        .btn-secondary { background-color: transparent; color: var(--brand-text); border: 1px solid var(--brand-text); }
        .btn-dark { background-color: rgba(0,0,0,0.5); color: white; border: 1px solid rgba(255,255,255,0.2); }
        
        .mini-btn { background-color: transparent; border: 1px solid rgba(255,255,255,0.4); color: white; border-radius: 4px; width: 28px; height: 28px; font-size: 1.2rem; cursor: pointer; margin: 0 5px; display: flex; align-items: center; justify-content: center; padding: 0; transition: all 0.2s; }
        .mini-btn:active { background-color: white; color: var(--brand-bg); }

        .close-modal { background: transparent; color: rgba(255,255,255,0.8); border: none; font-weight: bold; cursor: pointer; font-size: 0.85rem; font-family: 'Quicksand', sans-serif; margin-top: 20px; letter-spacing: 1px; padding: 10px;}

        .active-bill-item { border-bottom: 1px solid rgba(255,255,255,0.2); padding: 15px 5px; margin-bottom: 5px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .bill-receipt { background-color: transparent; border: 1px solid rgba(255,255,255,0.2); color: white; padding: 15px; border-radius: 8px; text-align: left; margin-bottom: 15px; font-size: 0.9rem; }
        .bill-receipt-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; border-bottom: 1px dashed rgba(255,255,255,0.2); padding-bottom: 8px; }
        .bill-receipt-row:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0;}
        .bill-grand-total { font-size: 1.2rem; font-weight: bold; text-align: right; margin-top: 10px; border-top: 1px solid white; padding-top: 10px;}
        .item-remove-x { color: rgba(255,255,255,0.5); font-weight: normal; font-size: 1.2rem; cursor: pointer; padding: 5px 12px 5px 0; }
        
        #qr-image { width: 150px; height: 150px; margin: 15px auto; border-radius: 8px; display: block; background: white; padding: 5px; }

        .ledger-box { border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 8px; padding: 10px; max-height: 200px; overflow-y: auto; text-align: left; margin-top: 15px; }
        .ledger-item { display: flex; justify-content: space-between; border-bottom: 1px dashed rgba(255, 255, 255, 0.1); padding: 8px 0; font-size: 0.85rem; }
        .ledger-item:last-child { border-bottom: none; }
        .ledger-income { color: white; font-weight: bold; }
        .ledger-out { color: rgba(255, 255, 255, 0.6); }
        .ledger-meta { font-size: 0.75rem; opacity: 0.5; display: block; margin-top: 2px;}
    </style>
</head>
<body>
    <div id="login-overlay">
        <div id="login-box">
            <h2>ILA Staff</h2>
            <input type="email" id="login-email" placeholder="Email" autocomplete="username">
            <input type="password" id="login-password" placeholder="Password" autocomplete="current-password">
            <button onclick="window.signInStaff()">Sign In</button>
            <div id="login-error"></div>
        </div>
    </div>

    <div class="container">
        <header>
            <img src="logo.png" alt="ILA Logo" class="logo">
            <div id="offline-indicator" style="display:none; background:transparent; border: 1px solid rgba(255,255,255,0.5); color:white; opacity: 0.8; padding:5px; border-radius:4px; font-size:0.75rem; font-weight:bold; margin-top:15px; letter-spacing: 1px;">OFFLINE MODE</div>
        </header>

        <div id="notification-area"></div>

        <div class="dashboard-bar">
            <div class="dash-stat" onclick="openActiveBills()"><span class="dash-label">Bills</span><span class="dash-value" id="active-bills-count">0</span></div>
            <div class="dash-divider"></div>
            <div class="dash-stat" id="web-dash-stat" onclick="openWebOrders()"><span class="dash-label">Web</span><span class="dash-value" id="web-orders-count">0</span></div>
            <div class="dash-divider"></div>
            <div class="dash-stat" onclick="openCashManagement()"><span class="dash-label">Cash</span><span class="dash-value" id="cash-display">₹0</span></div>
            <div class="dash-divider"></div>
            <div class="dash-stat" onclick="openCashManagement()"><span class="dash-label">UPI</span><span class="dash-value" id="upi-display">₹0</span></div>
            <div class="dash-divider"></div>
            <div class="dash-stat" onclick="openPastBills()"><span class="dash-label">Shots</span><span class="dash-value" id="cups-display">0</span></div>
        </div>

        <div id="live-menu-container">
            <p style="text-align: center; opacity: 0.5; margin-top: 50px;">Loading...</p>
        </div>
    </div>

    <div id="cart-banner">
        <div class="cart-info" onclick="openReviewCartModal()"><span class="cart-total" id="cart-total-text">₹0</span><span class="cart-clear">View Items</span></div>
        <button class="checkout-btn" onclick="openTableModal()">Send Order</button>
    </div>

    <div id="web-orders-modal" class="modal-overlay">
        <div class="modal-content">
            <h3>Web Orders</h3>
            <div id="web-orders-list" style="margin-top: 15px; max-height: 400px; overflow-y: auto;"></div>
            <button class="close-modal" onclick="closeModal('web-orders-modal')">✖ CLOSE</button>
        </div>
    </div>

    <div id="review-cart-modal" class="modal-overlay">
        <div class="modal-content">
            <h3>Cart</h3>
            <div id="review-cart-list" class="bill-receipt" style="max-height: 250px; overflow-y: auto; margin-top: 15px;"></div>
            <div class="modal-buttons"><button class="btn btn-secondary" onclick="clearCart()">Empty</button></div>
            <button class="close-modal" onclick="closeModal('review-cart-modal')">✖ CLOSE</button>
        </div>
    </div>

    <div id="remark-modal" class="modal-overlay">
        <div class="modal-content">
            <h3 id="remark-item-title">Item</h3>
            <div style="text-align: left; width: 100%; margin: 15px auto;">
                <label style="opacity: 0.7; font-size: 0.8rem; text-transform: uppercase;">Preferences</label>
                <div class="choice-grid" id="pos-sweetness-grid"></div>
            </div>
            <div class="modal-buttons">
                <button class="btn btn-secondary" onclick="closeModal('remark-modal')">Cancel</button>
                <button class="btn btn-primary" onclick="confirmAddItem()">Add</button>
            </div>
            <button class="close-modal" onclick="closeModal('remark-modal')">✖ CLOSE</button>
        </div>
    </div>

    <div id="table-modal" class="modal-overlay">
        <div class="modal-content">
            <h3>Send Order</h3>
            <textarea id="pos-order-notes" class="remark-input" placeholder="Order notes (e.g. To-go cup, extra hot...)" style="height: 50px; resize: none; margin-top: 5px; margin-bottom: 15px;"></textarea>
            
            <div class="table-grid" id="sender-table-grid"></div>
            <button class="takeaway-btn" onclick="sendOrder('Takeaway')">Takeaway</button><br>
            <button class="close-modal" onclick="closeModal('table-modal')">✖ CLOSE</button>
        </div>
    </div>

    <div id="active-bills-modal" class="modal-overlay">
        <div class="modal-content">
            <h3>Open Tables</h3>
            <div id="active-bills-list" style="margin-top: 15px; max-height: 300px; overflow-y: auto;"></div>
            <button class="close-modal" onclick="closeModal('active-bills-modal')">✖ CLOSE</button>
        </div>
    </div>

    <div id="past-bills-modal" class="modal-overlay">
        <div class="modal-content">
            <h3>History</h3>
            <div id="past-bills-list" class="ledger-box" style="max-height: 300px; margin-top: 15px;"></div>
            <button class="close-modal" onclick="closeModal('past-bills-modal')">✖ CLOSE</button>
        </div>
    </div>

    <div id="view-past-bill-modal" class="modal-overlay">
        <div class="modal-content">
            <h3 id="past-bill-title">Receipt</h3>
            <p id="past-bill-date" style="font-size: 0.8rem; margin-top: -10px; margin-bottom: 15px; opacity: 0.6;"></p>
            <div id="past-bill-receipt" class="bill-receipt"></div>
            <input type="tel" id="past-bill-phone" class="remark-input" placeholder="Phone No." maxlength="10">
            <button class="btn btn-secondary" style="width: 100%; margin-top: 5px;" onclick="sendPastBillWhatsApp()">Send Receipt</button>
            <button class="close-modal" onclick="closeModal('view-past-bill-modal')">✖ CLOSE</button>
        </div>
    </div>

    <div id="move-table-modal" class="modal-overlay">
        <div class="modal-content">
            <h3>Move To</h3>
            <div class="table-grid" id="move-table-grid"></div>
            <button class="takeaway-btn" onclick="window.confirmMoveTable('Takeaway')">Takeaway</button><br>
            <button class="close-modal" onclick="closeModal('move-table-modal')">✖ CANCEL</button>
        </div>
    </div>

    <div id="checkout-modal" class="modal-overlay">
        <div class="modal-content">
            <h3 id="checkout-title">Bill</h3>
            <div id="checkout-receipt" class="bill-receipt" style="max-height: 35vh; overflow-y: auto;"></div>
            
            <input type="tel" id="checkout-phone" class="remark-input" placeholder="Phone No." maxlength="10">
            <button class="btn btn-secondary" style="width: 100%; margin-bottom: 15px;" onclick="sendWhatsAppBill()">Send Pay Link</button>
            
            <div class="modal-buttons">
                <button class="btn btn-dark" onclick="openSplitBill()">Split</button>
                <button class="btn btn-primary" onclick="payWithUPI(null)">UPI</button>
                <button class="btn btn-primary" onclick="payWithCash(null)">Cash</button>
            </div>
            <button class="close-modal" onclick="closeModal('checkout-modal')">✖ CLOSE</button>
        </div>
    </div>

    <div id="split-bill-modal" class="modal-overlay">
        <div class="modal-content">
            <h3>Split Bill</h3>
            <div style="font-size: 1rem; margin-bottom: 5px; opacity: 0.8;">Total: ₹<span id="split-total">0</span></div>
            <div style="font-size: 1.4rem; font-weight: bold; margin-bottom: 15px;">Due: ₹<span id="split-remaining">0</span></div>

            <div style="display: flex; gap: 10px; margin-bottom: 15px; justify-content: center;">
                <button class="btn btn-secondary" style="flex:1;" onclick="calculateSplit(2)">/ 2</button>
                <button class="btn btn-secondary" style="flex:1;" onclick="calculateSplit(3)">/ 3</button>
                <button class="btn btn-secondary" style="flex:1;" onclick="calculateSplit(4)">/ 4</button>
            </div>

            <p style="text-align: left; font-size: 0.8rem; font-weight: bold; text-transform: uppercase; margin-bottom: 0; opacity: 0.7; width: 90%; margin-left: auto; margin-right: auto;">Collect Now (₹)</p>
            <input type="number" id="partial-pay-amount" class="remark-input" placeholder="0">

            <div class="modal-buttons" style="margin-top: 20px;">
                <button class="btn btn-primary" onclick="processSplit('upi')">UPI</button>
                <button class="btn btn-primary" onclick="processSplit('cash')">Cash</button>
            </div>
            <button class="close-modal" onclick="closeSplitBill()">✖ CANCEL</button>
        </div>
    </div>

    <div id="upi-modal" class="modal-overlay">
        <div class="modal-content">
            <h3>Scan</h3>
            <p id="upi-amount-text" style="font-size: 1.2rem; font-weight: bold; margin-bottom: 5px;">₹0</p>
            <img id="qr-image" src="" alt="QR">
            <div id="upi-status" class="upi-status">v2-autoverify</div>
            <div class="modal-buttons"><button class="btn btn-primary" style="width: 100%;" onclick="confirmUPIPayment()">Confirm Payment</button></div>
            <button class="close-modal" onclick="cancelUPI()">✖ CANCEL</button>
        </div>
    </div>

    <div id="cash-modal" class="modal-overlay">
        <div class="modal-content">
            <h3>Ledger</h3>
            <div style="display: flex; justify-content: space-around; margin-bottom: 20px; font-size: 1rem; font-weight: bold;">
                <div>Drawer<br><span style="font-size: 1.2rem;">₹<span id="modal-cash-display">0</span></span></div>
                <div>UPI<br><span style="font-size: 1.2rem;">₹<span id="modal-upi-display">0</span></span></div>
            </div>
            
            <div class="modal-buttons" style="margin-bottom: 15px;">
                <button class="btn btn-secondary" onclick="openTransactionModal('expense')">Expense</button>
                <button class="btn btn-secondary" onclick="openTransactionModal('withdrawal')">Withdraw</button>
            </div>
            <div style="display: flex; gap: 10px; margin-bottom: 15px;">

        let audioCtx = null;
        function initAudio() {
            if (!audioCtx) { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
            if (audioCtx.state === 'suspended') { audioCtx.resume(); }
        }
        document.addEventListener('click', initAudio, { once: true });

        function playClassyChime() {
            if (!audioCtx) return;
            try {
                if (audioCtx.state === 'suspended') audioCtx.resume();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                
                // Creates a soft, pleasant "bell" frequency
                osc.type = 'sine';
                osc.frequency.setValueAtTime(1046.50, audioCtx.currentTime); // C6 Note
                
                // Fades out gently over 0.8 seconds so it isn't jarring
                gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.8);
                
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.8);
            } catch(e) { console.error("Chime failed", e); }
        }

            const data = new TextEncoder().encode(PIN_SALT + String(pin).trim());

        function calculateDailyCups() {
            let cupTotal = 0;

            startOfToday.setHours(0, 0, 0, 0);
            const startOfTodayMs = startOfToday.getTime();
            
            let coffeeKeys = Object.keys(window.coffeeItemsMap).sort((a,b) => b.length - a.length);

            window.pastBills.forEach(bill => {
                if(bill.id >= startOfTodayMs && bill.items) {
                    for(let itemName in bill.items) {
                        let matchedCoffee = coffeeKeys.find(key => itemName.startsWith(key));
                        if(matchedCoffee) {
                            let qty = bill.items[itemName].qty || 0;
                            if(itemName.includes("(Large)")) { cupTotal += (qty * 3); } 
                            else { cupTotal += (qty * 2); }
                        }
                    }
                }
            });
            document.getElementById('cups-display').innerText = cupTotal;
        }

                });

                if (sizedItems.length > 0) {
                    catHTML += `<div class="coffee-header"><div></div><div style="text-align: right;">Reg</div><div style="text-align: right;">Lrg</div></div>`;
                    sizedItems.forEach(item => {
                        let safeNameReg = (item.originalName + " (Regular)").replace(/'/g, "\\'").replace(/"/g, "&quot;");

            const timeStr = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            if (Object.keys(baristaItems).length > 0) {
                db.ref('orders/active/barista').push({ items: baristaItems, destination: destination, notes: notes, source: source, time: timeStr, createdAt: firebase.database.ServerValue.TIMESTAMP });
            }
            if (Object.keys(chefItems).length > 0) {
                db.ref('orders/active/chef').push({ items: chefItems, destination: destination, notes: notes, source: source, time: timeStr, createdAt: firebase.database.ServerValue.TIMESTAMP });

        window.sendOrder = function(tableID) {
            if (window.totalItems === 0) return alert("Cart is empty!");
            
            const notes = document.getElementById('pos-order-notes').value.trim().replace(/</g, "&lt;").replace(/>/g, "&gt;");
            let destName = tableID === 'Takeaway' ? 'Takeaway' : 'Table ' + tableID;
            
            try {
                dispatchToKitchen(window.cart, destName, notes, "POS");
            } catch(e) { console.error("Kitchen dispatch error", e); }

            if (!window.activeTables[tableID]) window.activeTables[tableID] = { items: {}, total: 0, paid: 0, notes: "" };
            
            if (notes) {
                if (window.activeTables[tableID].notes) window.activeTables[tableID].notes += " | " + notes;
                else window.activeTables[tableID].notes = notes;
            }

            for (let item in window.cart) {
                if (window.activeTables[tableID].items[item]) window.activeTables[tableID].items[item].qty += window.cart[item].qty;
                else window.activeTables[tableID].items[item] = { price: window.cart[item].price, qty: window.cart[item].qty };
            }
            
            let safeTotal = parseFloat(window.totalAmount) || 0;
            window.activeTables[tableID].total = (parseFloat(window.activeTables[tableID].total) || 0) + safeTotal;

            // Atomic per-item writes: if two devices add to the SAME table at once, qty and total
            // INCREMENT (both orders kept) instead of one overwriting the other. The local update
            // above is just instant on-screen feedback; the listener reconciles to the cloud value.
            for (let it in window.cart) {
                db.ref('pos/activeTables/' + tableID + '/items/' + it + '/price').set(window.cart[it].price);
                db.ref('pos/activeTables/' + tableID + '/items/' + it + '/qty').set(firebase.database.ServerValue.increment(window.cart[it].qty));
            }
            db.ref('pos/activeTables/' + tableID + '/total').set(firebase.database.ServerValue.increment(safeTotal));
            if (notes) db.ref('pos/activeTables/' + tableID + '/notes').transaction(c => c ? c + " | " + notes : notes);
            
            closeModal('table-modal'); 
            window.clearCart();
        };

        window.removeTableItem = async function(tableID, itemName) {
            let realItemName = itemName.replace(/&quot;/g, '"');
            const tableData = window.activeTables[tableID];
            
            if(tableData && tableData.items[realItemName]) {
                const reason = prompt(`Removing ${realItemName}. Reason?`);
                if (!reason) return; 

                const voidPin = prompt("Staff PIN to authorize this void:");
                if (!voidPin) return;
                const authName = window.staffPins[await hashPin(voidPin)];
                if (!authName) { alert("Invalid PIN — void cancelled."); return; }

                const voidData = {
                    time: new Date().toLocaleString(),
                    ts: Date.now(),
                    table: tableID,
                    item: realItemName,
                    value: tableData.items[realItemName].price,
                    reason: reason,
                    by: authName,
                    device: (window.currentStaff && window.currentStaff.name) ? window.currentStaff.name : "Unknown",
                    deviceUid: (window.currentStaff && window.currentStaff.uid) ? window.currentStaff.uid : ""
                };
                db.ref('security/voids').push(voidData);
                posSendPush({ title: '\u26a0\ufe0f Void', body: voidData.item + ' \u20b9' + Math.round(voidData.value) + ' \u00b7 ' + (tableID.startsWith('Takeaway') ? tableID : 'Table ' + tableID) + ' \u00b7 by ' + voidData.by + (reason ? ' \u2014 ' + reason : ''), tag: 'void-' + voidData.ts, url: '/admin.html' });

                let destName = tableID.startsWith('Takeaway') ? tableID : 'Table ' + tableID;
                let voidCart = {};
                voidCart[realItemName] = { price: 0, qty: "❌ -1" }; 
                try {
                    dispatchToKitchen(voidCart, destName, `VOID / CANCELLED. Reason: ${reason}`, "POS Update");
                } catch(e) { console.error("Kitchen dispatch error", e); }

                tableData.total = (parseFloat(tableData.total) || 0) - (parseFloat(tableData.items[realItemName].price) || 0); 
                tableData.items[realItemName].qty -= 1;
                if(tableData.items[realItemName].qty <= 0) delete tableData.items[realItemName];
                
                let paid = parseFloat(tableData.paid) || 0;
                let newTotal = parseFloat(tableData.total) || 0;

                if(Object.keys(tableData.items).length === 0) { 
                    delete window.activeTables[tableID]; syncToCloud(tableID); closeModal('checkout-modal'); return; 
                }
                if(paid >= newTotal && paid > 0) {
                     archivePOSTable(tableID, tableData, "Partial/Cleared");
                     delete window.activeTables[tableID]; syncToCloud(tableID); closeModal('checkout-modal'); return;
                }
                syncToCloud(tableID);
            }
        };

        // ---- UPI auto-verification ------------------------------------------
        // While the QR is on screen we watch payments/incoming for a credit of
        // the exact amount that landed in this window. The first device to CLAIM
        // a credit (atomic transaction on payments/claims/{ref}) owns it, so one
        // payment can never confirm two orders. Manual "Confirm Payment" stays as
        // the fallback for the slow tail and accounts that don't alert in time.
        function setUPIStatus(state, info){
            const el = document.getElementById('upi-status'); if(!el) return;
            if (state === 'waiting'){ el.className = 'upi-status waiting'; el.innerText = '● Waiting for payment…'; }
            else if (state === 'verified'){ el.className = 'upi-status verified'; el.innerText = '✓ Received' + (info && info.payer ? ' — ' + info.payer : '') + ' · ₹' + (info ? info.amount : ''); }
            else { el.className = 'upi-status'; el.innerText = ''; }
        }
        function stopUPIWatch(){
            if (window.upiWatchRef){ try { window.upiWatchRef.q.off('child_added', window.upiWatchRef.handler); } catch(e){} window.upiWatchRef = null; }
        }
        function startUPIWatch(amount){
            stopUPIWatch();
            window.upiSettling = false; window.upiMatchedInfo = null;
            window.upiWatchSince = Date.now() - 90000;   // accept a credit up to 90s before the QR opened
            setUPIStatus('waiting');
            const q = db.ref('payments/incoming').orderByChild('at').startAt(window.upiWatchSince);
            const handler = snap => {
                if (window.upiSettling) return;
                const p = snap.val(); if(!p) return;
                if (Math.abs((parseFloat(p.amount)||0) - amount) >= 0.5) return;   // amount must match
                claimPayment(snap.key, p, won => { if (won && !window.upiSettling) autoConfirmUPI({ ref:snap.key, payer:p.payer||null, amount:p.amount, source:p.source||null }); });
            };
            q.on('child_added', handler);
            window.upiWatchRef = { q, handler };
        }
        function claimPayment(ref, p, cb){
            const token = 'pos-' + (window.checkoutTableID||'?') + '-' + Date.now() + '-' + Math.random().toString(36).slice(2,6);
            db.ref('payments/claims/' + ref).transaction(
                curr => (curr === null ? token : undefined),   // claim only if unclaimed, else abort
                (err, committed, snap) => { cb(!err && committed && snap && snap.val() === token); }
            );
        }
        function autoConfirmUPI(info){
            if (window.upiSettling) return;
            window.upiSettling = true; stopUPIWatch();
            window.upiMatchedInfo = info;
            setUPIStatus('verified', info);
            if (navigator.vibrate) navigator.vibrate([60,40,120]);
            setTimeout(() => settleUPI(info), 900);   // let the cashier see the tick before the modal closes
        }
        function settleUPI(info){
            const tableID = window.checkoutTableID;
            const tableData = window.activeTables[tableID];
            if (!tableData){ closeModal('upi-modal'); return; }
            const amountToPay = parseFloat(window.pendingUPIAmount) || 0;
            const total = parseFloat(tableData.total) || 0;
            const paid = parseFloat(tableData.paid) || 0;
            const reason = tableID === 'Takeaway' ? 'Takeaway (UPI)' : `Table ${tableID} (UPI)`;
            addLedgerEntry('upi_income', amountToPay, reason);
            tableData.paid = paid + amountToPay;
            tableData._lastPay = info || null;   // archive records verification provenance
            if (tableData.paid >= total){
                archivePOSTable(tableID, tableData, "UPI");
                delete window.activeTables[tableID]; syncToCloud(tableID);
                closeModal('upi-modal');
            } else {
                syncToCloud(tableID); closeModal('upi-modal'); window.openCheckout(tableID);
            }
        }
        window.cancelUPI = function(){ stopUPIWatch(); window.upiSettling = false; setUPIStatus(null); closeModal('upi-modal'); };
        // Manual fallback: claim a matching credit if one is already in, otherwise
        // settle as an un-verified manual confirm (the cashier is vouching for it).
        window.confirmUPIPayment = function(){
            if (window.upiSettling) return;
            const amount = parseFloat(window.pendingUPIAmount) || 0;
            const since = window.upiWatchSince || (Date.now() - 600000);
            db.ref('payments/incoming').orderByChild('at').startAt(since).once('value', snap => {
                if (window.upiSettling) return;
                const cand = []; snap.forEach(ch => { const p = ch.val(); if (p && Math.abs((parseFloat(p.amount)||0) - amount) < 0.5) cand.push({ key:ch.key, p }); });
                const tryNext = i => {
                    if (window.upiSettling) return;
                    if (i >= cand.length){ window.upiSettling = true; stopUPIWatch(); settleUPI(null); return; }   // nothing claimable → manual unverified
                    claimPayment(cand[i].key, cand[i].p, won => {
                        if (won && !window.upiSettling){ window.upiSettling = true; stopUPIWatch(); const p = cand[i].p; settleUPI({ ref:cand[i].key, payer:p.payer||null, amount:p.amount, source:p.source||null }); }
                        else tryNext(i+1);
                    });
                };
                tryNext(0);
            });
        };

        function addLedgerEntry(type, amount, reason) {
            const parsedAmount = parseFloat(amount) || 0;
            const timeString = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});

            // Each entry is its own child — push() never touches siblings and merges cleanly
            // after an offline spell.
            db.ref('pos/ledgerEntries').push({
                date: timeString, type: type, amount: parsedAmount, reason: reason,
                ts: firebase.database.ServerValue.TIMESTAMP
            });

            // Running totals via atomic increment — concurrent sales can't lose each other,
            // it shows instantly, and reconciles correctly after reconnect.
            if (type === 'cash_income') {
                db.ref('pos/cashDrawer').set(firebase.database.ServerValue.increment(parsedAmount));
            } else if (type === 'upi_income') {
                db.ref('pos/upiTotal').set(firebase.database.ServerValue.increment(parsedAmount));
            } else {
                db.ref('pos/cashDrawer').set(firebase.database.ServerValue.increment(-parsedAmount));
            }
        }

        function renderLedger() {
            const list = document.getElementById('ledger-list'); list.innerHTML = "";
            if (window.salesLedger.length === 0) { list.innerHTML = "<p style='opacity:0.5;'>No logs.</p>"; return; }
            window.salesLedger.forEach(entry => {
                let colorClass = 'ledger-out'; let sign = '-'; let typeTag = '';
                if (entry.type === 'cash_income') { colorClass = 'ledger-income'; sign = '+'; typeTag = 'CASH: '; } 
                else if (entry.type === 'upi_income') { colorClass = 'ledger-income'; sign = '+'; typeTag = 'UPI: '; }
                
                let safeAmount = parseFloat(entry.amount) || 0;
                list.innerHTML += `<div class="ledger-item"><div><span style="font-weight:bold;">${typeTag}</span><span>${escapeHTML(entry.reason)}</span><span class="ledger-meta">${entry.date}</span></div><div class="${colorClass}">${sign}₹${Math.round(safeAmount)}</div></div>`;
            });
        }

        window.openPastBills = function() {
            const list = document.getElementById('past-bills-list'); list.innerHTML = "";
            if (window.pastBills.length === 0) { list.innerHTML = "<p style='opacity:0.5;'>No logs.</p>"; } 
            else { window.pastBills.forEach(bill => { list.innerHTML += `<div class="active-bill-item" style="border:none;" onclick="window.viewPastBill(${bill.id})"><div><span style="font-weight: bold;">${escapeHTML(bill.table)}</span><span class="ledger-meta">${bill.date}</span></div><span>₹${bill.total}</span></div>`; }); }
            document.getElementById('past-bills-modal').classList.add('active');
        };

        window.viewPastBill = function(id) {
            const bill = window.pastBills.find(b => b.id === id); if (!bill) return; window.currentPastBillID = id;
            document.getElementById('past-bill-title').innerText = bill.table;
            document.getElementById('past-bill-date').innerText = bill.date;
            let receiptHTML = ""; 
            if (bill.notes) receiptHTML += `<div style="font-size: 0.8rem; opacity: 0.7; margin-bottom: 10px; font-style: italic;">Notes: ${escapeHTML(bill.notes)}</div>`;
            for (let item in bill.items) { receiptHTML += `<div class="bill-receipt-row"><span>${bill.items[item].qty}x ${escapeHTML(item)}</span><span>₹${bill.items[item].qty * bill.items[item].price}</span></div>`; }
            receiptHTML += `<div class="bill-grand-total">Total: ₹${bill.total}</div>`;
            document.getElementById('past-bill-receipt').innerHTML = receiptHTML; document.getElementById('past-bill-phone').value = "";
            closeModal('past-bills-modal'); document.getElementById('view-past-bill-modal').classList.add('active');
        };

        window.sendPastBillWhatsApp = function() {
            const phone = document.getElementById('past-bill-phone').value.trim(); if (phone.length < 10) return;
            const bill = window.pastBills.find(b => b.id === window.currentPastBillID); let billStr = `ILA\n\n`;
            for (let item in bill.items) { billStr += `${bill.items[item].qty}x ${item} - ₹${bill.items[item].qty * bill.items[item].price}\n`; }
            billStr += `\nPaid: ₹${bill.total}`; window.location.href = `https://wa.me/91${phone}?text=${encodeURIComponent(billStr)}`;
        };

        window.sendWhatsAppBill = function() {
            const phone = document.getElementById('checkout-phone').value.trim(); if (phone.length < 10) return;
            const tableData = window.activeTables[window.checkoutTableID]; let billStr = `ILA\n\n`;
            for (let item in tableData.items) { billStr += `${tableData.items[item].qty}x ${item} - ₹${tableData.items[item].qty * tableData.items[item].price}\n`; }
            
            let total = parseFloat(tableData.total) || 0;
            let paid = parseFloat(tableData.paid) || 0;
            let remaining = total - paid;

            billStr += `\nTotal: ₹${total}\n`;
            if(paid > 0) billStr += `Paid: ₹${paid}\nDue: ₹${remaining}\n\n`;
            else billStr += `\n`;

            const selectedUPI = window.getRandomUPI();
            billStr += `Pay via UPI:\n${CAFE_WEBSITE_LINK}/pay.html?am=${remaining}&id=${selectedUPI}`;
            window.location.href = `https://wa.me/91${phone}?text=${encodeURIComponent(billStr)}`;
        };

        window.openCashManagement = function() { renderLedger(); document.getElementById('cash-modal').classList.add('active'); };
        window.openTransactionModal = function(type) { window.currentTransactionType = type; document.getElementById('transaction-title').innerText = type === 'expense' ? 'Expense' : 'Withdrawal'; document.getElementById('transaction-amount').value = ""; document.getElementById('transaction-reason').value = ""; document.getElementById('transaction-pin').value = ""; closeModal('cash-modal'); document.getElementById('transaction-modal').classList.add('active'); setTimeout(() => { document.getElementById('transaction-amount').focus(); }, 100); };
        window.closeTransactionModal = function() { closeModal('transaction-modal'); window.openCashManagement(); };

        window.confirmTransaction = async function() {
            const amount = parseFloat(document.getElementById('transaction-amount').value); const reasonStr = document.getElementById('transaction-reason').value.trim(); const pinStr = document.getElementById('transaction-pin').value.trim();
            if (isNaN(amount) || amount <= 0 || reasonStr === "") return;
            const staffName = window.staffPins[await hashPin(pinStr)]; if (!staffName) return alert("Invalid PIN.");
            
            let currentCash = parseFloat(window.cashDrawer) || 0;
            if (amount > currentCash && !confirm(`Only ₹${currentCash} in drawer. Continue?`)) return;
            
            addLedgerEntry(window.currentTransactionType, amount, `${reasonStr} (${staffName})`);
            window.closeTransactionModal();
        };

        const ALERT_WORKER_URL = 'https://ila-push.sraveen-chirania.workers.dev/';
        const ALERT_SECRET = '60765ac4763b2df758331f5dea3a145862078c27b72d3efb';
        async function posSendPush(notification){
            if (!ALERT_WORKER_URL) return;
            try {
                const snap = await db.ref('pushSubscriptions').once('value');
                const subscriptions = Object.values(snap.val() || {}).map(function(x){ return x && x.subscription; }).filter(Boolean);
                if (!subscriptions.length) return;
                await fetch(ALERT_WORKER_URL, { method: 'POST', headers: { 'Content-Type': 'text/plain' }, body: JSON.stringify({ secret: ALERT_SECRET, notification: notification, subscriptions: subscriptions }) });
            } catch (e) { console.error('push failed', e); }
        }
        window.promptEOD = async function() {
            const pinStr = prompt("Enter PIN:"); if (!pinStr) return;
            const staffName = window.staffPins[await hashPin(pinStr)]; if (!staffName) return alert("Invalid PIN.");
            if (Object.keys(window.activeTables).length > 0) { if(!confirm("Tables open. End day?")) return; }
            
            let safeUPI = parseFloat(window.upiTotal) || 0;
            let safeCash = parseFloat(window.cashDrawer) || 0;

            let report = `ILA - EOD\nBy: ${staffName}\nDate: ${new Date().toLocaleDateString()}\n\nUPI: ₹${Math.round(safeUPI)}\nCash: ₹${Math.round(safeCash)}\n\nEXPENSES:\n`;
            let exp = false; window.salesLedger.forEach(e => { if (e.type !== 'cash_income' && e.type !== 'upi_income') { report += `- ₹${e.amount} | ${e.reason}\n`; exp = true; } });
            if (!exp) report += `None.\n`;
            if (confirm("Close the day? Today's sales will be archived and the till reset for tomorrow.")) {
                const todayKey = new Date().toISOString().slice(0, 10);
                // Snapshot the whole day BEFORE wiping, so nothing is lost if the WhatsApp
                // hand-off fails. Then clear the live nodes for the new day.
                db.ref('pos/eodArchive/' + todayKey + '-' + Date.now()).set({
                    report: report, upi: safeUPI, cash: safeCash,
                    bills: window.pastBills, ledger: window.salesLedger,
                    closedBy: staffName, closedAt: firebase.database.ServerValue.TIMESTAMP
                }).then(() => {
                    db.ref('pos/ledgerEntries').remove();
                    db.ref('pos/bills').remove();
                    // cashDrawer is NOT reset — physical cash carries forward to the next day.
                    db.ref('pos/upiTotal').set(0);
                    db.ref('pos/activeTables').remove();
                });
                var _eodBills = Array.isArray(window.pastBills) ? window.pastBills.length : 0;
                var _eodExp = 0; (window.salesLedger || []).forEach(function(e){ if (e.type !== 'cash_income' && e.type !== 'upi_income') _eodExp += (parseFloat(e.amount) || 0); });
                posSendPush({ title: '\ud83d\udccb EOD \u2014 ' + staffName, body: 'UPI \u20b9' + Math.round(safeUPI) + ' \u00b7 Cash \u20b9' + Math.round(safeCash) + ' \u00b7 ' + _eodBills + ' bills' + (_eodExp ? ' \u00b7 Exp \u20b9' + Math.round(_eodExp) : ''), tag: 'eod', url: '/admin.html' });
                window.activeTables = {}; window.upiTotal = 0; window.salesLedger = []; window.pastBills = [];
                closeModal('cash-modal');
                setTimeout(() => { window.location.href = `https://wa.me/${OWNER_WHATSAPP}?text=${encodeURIComponent(report)}`; }, 300);
            }
        };

        window.openMoveTable = function() {
            const grid = document.getElementById('move-table-grid');
            grid.innerHTML = "";
            for (let i = 1; i <= 10; i++) {
                const isOccupied = window.activeTables[i.toString()] ? 'occupied' : '';
                grid.innerHTML += `<button class="table-btn ${isOccupied}" onclick="window.confirmMoveTable('${i}')">${i}</button>`;
            }
            closeModal('checkout-modal'); 
            document.getElementById('move-table-modal').classList.add('active');
        };

        window.confirmMoveTable = function(newTableID) {
            const oldTableID = window.checkoutTableID;
            if (newTableID === oldTableID) {
                closeModal('move-table-modal'); window.openCheckout(oldTableID); return;
            }
            
            if (window.activeTables[newTableID] && !confirm(`Table ${newTableID} is already occupied. Merge bills?`)) return;

            // 1. Shift the POS Data
            const tableData = window.activeTables[oldTableID];
            if (window.activeTables[newTableID]) {
                let existing = window.activeTables[newTableID];
                existing.total = (parseFloat(existing.total) || 0) + (parseFloat(tableData.total) || 0);
                existing.paid = (parseFloat(existing.paid) || 0) + (parseFloat(tableData.paid) || 0);
                if (tableData.notes) existing.notes = existing.notes ? existing.notes + " | " + tableData.notes : tableData.notes;
                
                for (let item in tableData.items) {
                    if (existing.items[item]) existing.items[item].qty += tableData.items[item].qty;
                    else existing.items[item] = tableData.items[item];
                }
            } else {
                window.activeTables[newTableID] = tableData;
            }
            delete window.activeTables[oldTableID];

            // Persist BOTH sides of the move in ONE atomic write: save the moved/merged
            // table AND remove the old one together, so the live 'pos/activeTables' listener
            // always rebuilds from a consistent state. (The previous code synced only the
            // removed table, so the moved order was never written to the cloud and the
            // listener then wiped it from this device too.)
            const movedData = window.activeTables[newTableID] || null;
            const moveUpdates = {};
            moveUpdates['pos/activeTables/' + newTableID] = movedData;
            moveUpdates['pos/activeTables/' + oldTableID] = null;
            db.ref().update(moveUpdates).catch(e => console.error("Move sync error: ", e));

            // 2. Silently Hunt and Update KDS Tickets
            const oldDest = oldTableID === 'Takeaway' ? 'Takeaway' : 'Table ' + oldTableID;
            const newDest = newTableID === 'Takeaway' ? 'Takeaway' : 'Table ' + newTableID;

            ['chef', 'barista'].forEach(station => {
                db.ref(`orders/active/${station}`).once('value', snap => {
                    const tickets = snap.val();
                    if (tickets) {
                        for (let id in tickets) {
                            if (tickets[id].destination === oldDest) {
                                db.ref(`orders/active/${station}/${id}`).update({ destination: newDest });
                            }
                        }
                    }
                });
            });

            // 3. Reset the visual state
            closeModal('move-table-modal');
            window.openCheckout(newTableID);
        };

        updateCartUI();
    </script>
</body>
