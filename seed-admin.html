<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ILA — Make Admin (one-time)</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <style>
        :root { --brand: #8D6E52; }
        * { box-sizing: border-box; }
        body { font-family: 'Quicksand', sans-serif; background: var(--brand); color: #fff; margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
        .box { width: 100%; max-width: 360px; }
        h1 { font-size: 1.3rem; letter-spacing: 2px; text-transform: uppercase; text-align: center; margin: 0 0 6px; }
        p.sub { text-align: center; opacity: 0.8; font-size: 0.9rem; margin: 0 0 24px; }
        input { width: 100%; padding: 14px; margin: 8px 0; border-radius: 8px; border: 1px solid rgba(255,255,255,0.4); background: transparent; color: #fff; font-family: inherit; font-size: 1rem; outline: none; }
        input::placeholder { color: rgba(255,255,255,0.6); }
        button { width: 100%; padding: 15px; margin-top: 16px; border: none; border-radius: 8px; background: #fff; color: var(--brand); font-weight: 700; font-size: 1.05rem; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; font-family: inherit; }
        button:disabled { opacity: 0.6; }
        #msg { margin-top: 18px; padding: 14px; border-radius: 8px; font-size: 0.95rem; text-align: center; display: none; line-height: 1.5; }
        #msg.ok { display: block; background: rgba(255,255,255,0.18); }
        #msg.err { display: block; background: rgba(120,0,0,0.35); }
    </style>
</head>
<body>
    <div class="box">
        <h1>Make Admin</h1>
        <p class="sub">One-time setup. Log in with the account you just created and it'll mark you as admin.</p>
        <input type="email" id="email" placeholder="Email" autocomplete="username">
        <input type="password" id="password" placeholder="Password" autocomplete="current-password">
        <input type="text" id="name" placeholder="Your name (e.g. Sraveen)">
        <button id="go" onclick="makeAdmin()">Make me admin</button>
        <div id="msg"></div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAgUmy9NjbDnYXX_TBBjF8-qj36aW21qsQ",
            authDomain: "ila-cafe.firebaseapp.com",
            databaseURL: "https://ila-cafe-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "ila-cafe",
            storageBucket: "ila-cafe.firebasestorage.app",
            messagingSenderId: "473595092965",
            appId: "1:473595092965:web:4ba6243e67b9ed0adb990c"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        function show(text, ok) {
            const m = document.getElementById('msg');
            m.className = ok ? 'ok' : 'err';
            m.innerText = text;
        }

        window.makeAdmin = async function() {
            const email = document.getElementById('email').value.trim();
            const pw = document.getElementById('password').value;
            const name = document.getElementById('name').value.trim() || "Admin";
            const btn = document.getElementById('go');
            if (!email || !pw) { show("Enter the email and password of the account you created.", false); return; }
            btn.disabled = true; show("Working...", true);
            try {
                const cred = await auth.signInWithEmailAndPassword(email, pw);
                const uid = cred.user.uid;
                await db.ref('users/' + uid).set({ name: name, email: email, role: "admin" });
                show("Done — " + name + " is now an admin.\nYou can close this page and delete the file. Continue with Step 2.", true);
            } catch (e) {
                show("Failed: " + e.message, false);
                btn.disabled = false;
            }
        };
    </script>
</body>
</html>
