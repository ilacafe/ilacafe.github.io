<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>ILA | Admin</title>
    <link rel="apple-touch-icon" href="/icon.png" />
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;700&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        :root { --brand-bg: #8c7255; --brand-text: #ffffff; }
        body { background-color: var(--brand-bg); color: var(--brand-text); font-family: 'Quicksand', sans-serif; margin: 0; padding: 0; line-height: 1.6; display: flex; flex-direction: column; align-items: center; padding-bottom: 60px; }
        .container { width: 90%; max-width: 600px; margin: 0 auto; padding: 20px; }
        header { text-align: center; margin-bottom: 30px; margin-top: 10px; }
        
        h1 { font-weight: 700; font-size: 1.5rem; text-transform: uppercase; letter-spacing: 3px; margin: 0; }
        h2 { font-weight: 700; font-size: 1.1rem; text-transform: uppercase; letter-spacing: 2px; margin-top: 0; margin-bottom: 20px; border-bottom: 1px solid rgba(255, 255, 255, 0.2); padding-bottom: 10px; }

        .admin-card { background: rgba(0,0,0,0.1); border: 1px solid rgba(255, 255, 255, 0.2); padding: 25px 20px; border-radius: 12px; margin-bottom: 25px; width: 100%; box-sizing: border-box;}
        
        .row-group { display: flex; align-items: center; gap: 10px; }
        
        .remark-input { width: 100%; padding: 12px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.4); font-family: 'Quicksand', sans-serif; font-size: 1rem; background-color: transparent; color: white; display: block; box-sizing: border-box; outline: none; }
        .remark-input::placeholder { color: rgba(255,255,255,0.4); }
        select.remark-input option { background-color: var(--brand-bg); color: white; }

        .btn { padding: 12px 15px; border-radius: 6px; font-weight: bold; font-size: 0.95rem; cursor: pointer; font-family: 'Quicksand', sans-serif; text-transform: uppercase; letter-spacing: 1px; border: none; text-align: center; }
        .btn-primary { background-color: var(--brand-text); color: var(--brand-bg); }
        .btn-secondary { background-color: transparent; color: var(--brand-text); border: 1px solid var(--brand-text); }
        
        .btn-action { background-color: transparent; border: 1px solid rgba(255,255,255,0.4); color: white; border-radius: 4px; height: 44px; width: 44px; font-size: 1.2rem; cursor: pointer; display: flex; align-items: center; justify-content: center; padding: 0; transition: all 0.2s; }
        .btn-action:active { background-color: white; color: var(--brand-bg); }

        .list-item { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px dashed rgba(255, 255, 255, 0.2); padding: 12px 0; }
        .list-item:last-child { border-bottom: none; }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>ILA Admin</h1>
            <p style="opacity: 0.7; font-size: 0.85rem; margin-top: 5px; text-transform: uppercase; letter-spacing: 1px;">Control Panel</p>
        </header>

        <div class="admin-card">
            <h2>UPI Routing</h2>
            <div class="row-group" style="margin-bottom: 15px;">
                <input type="text" id="add-upi-id" class="remark-input" style="flex: 2; margin: 0;" placeholder="e.g. cafe@ybl">
                <button class="btn btn-secondary" style="flex: 1;" onclick="addUPI()">Add</button>
            </div>
            <div id="upi-list-container">
                <p style="opacity: 0.5; font-size: 0.9rem; text-align: center;">Loading UPI IDs...</p>
            </div>
        </div>

        <div class="admin-card">
            <h2>Recipe Builder</h2>
            <div style="margin-bottom: 20px; text-align: left;">
                <label style="opacity: 0.7; font-size: 0.8rem; text-transform: uppercase; font-weight: bold; display: block; margin-bottom: 5px;">Prepped Item (Output)</label>
                <select id="recipe-target" class="remark-input" onchange="loadExistingRecipe()"></select>
            </div>

            <div style="text-align: left; margin-bottom: 10px;">
                <label style="opacity: 0.7; font-size: 0.8rem; text-transform: uppercase; font-weight: bold;">Raw Ingredients Needed</label>
            </div>
            <div id="ingredient-list"></div>
            
            <div class="row-group" style="margin-top: 20px;">
                <button class="btn btn-secondary" style="flex: 1;" onclick="addIngredientRow()">+ Ingredient</button>
                <button class="btn btn-primary" style="flex: 1;" onclick="saveRecipe()">Save Recipe</button>
            </div>
        </div>

    </div>

    <script>
        // --- FIREBASE SETUP ---
        const firebaseConfig = {
            apiKey: "AIzaSyAgUmy9NjbDnYXX_TBBjF8-qj36aW21qsQ",
            authDomain: "ila-cafe.firebaseapp.com",
            databaseURL: "https://ila-cafe-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "ila-cafe",
            storageBucket: "ila-cafe.firebasestorage.app",
            messagingSenderId: "473595092965",
            appId: "1:473595092965:web:4ba6243e67b9ed0adb990c"
        };
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.database();

        // --- LIVE UPI ROUTING LOGIC ---
        let currentUPIs = ["sraveen.chirania-1@okaxis"]; // Default fallback
        
        db.ref('settings/upiList').on('value', snap => {
            currentUPIs = snap.val() || ["sraveen.chirania-1@okaxis"];
            const container = document.getElementById('upi-list-container');
            container.innerHTML = "";
            currentUPIs.forEach((upi, index) => {
                container.innerHTML += `
                    <div class="list-item">
                        <div style="font-size: 0.95rem;"><strong>${upi}</strong></div>
                        <button class="btn-action" style="height: 32px; width: 32px; font-size: 0.9rem;" onclick="removeUPI(${index})">✖</button>
                    </div>`;
            });
        });

        window.addUPI = function() {
            const val = document.getElementById('add-upi-id').value.trim();
            if(val && !currentUPIs.includes(val)) {
                currentUPIs.push(val);
                db.ref('settings/upiList').set(currentUPIs);
                document.getElementById('add-upi-id').value = "";
            }
        };

        window.removeUPI = function(index) {
            if(currentUPIs.length <= 1) return alert("You must have at least one active master UPI ID to receive payments.");
            if(confirm("Remove this UPI ID from the live rotation?")) {
                currentUPIs.splice(index, 1);
                db.ref('settings/upiList').set(currentUPIs);
            }
        };

        // --- RECIPE ENGINE LOGIC ---
        const RAW_ITEMS = [
            "Almond Flour", "Baking Powder", "Baking Soda", "Balsamic Vinegar", "Banana", "Basil", 
            "Beetroot", "Black Olives", "Brown Sugar", "Butter", "Cake Boxes", "Capsicum", "Carrot", 
            "Cashew", "Castor Sugar", "Cheddar", "Chilli Flakes (Bulk)", "Chilli Flakes Sachets", 
            "Chocolate", "Cinnamon", "Citric Acid", "Coffee Cups & Lids", "Commercial Milk", "Cream", 
            "Curd", "Flour", "Fresh Tomatoes", "Garlic", "Ghost Pepper", "Green Coffee Beans", 
            "Green Olives", "Jalapeño", "Lavender", "Matcha Powder", "Moldovan Salt", "Mushroom", 
            "Neutral Oil", "Olive", "Olive Oil", "Onion", "Oregano (Bulk)", "Oregano Sachets", 
            "Parmesan", "Pistachios", "Pizza Boxes", "Raw Milk", "Red Paprika", "Rose", "Saffron", 
            "Salt", "Semolina", "Sugar Sachets", "Teas", "Vegan Rennet", "Vanilla", "Whole Wheat Flour", "Yeast"
        ];

        const PREPPED_ITEMS = [
            "Banana Bread", "Basil Oil", "Burrata", "Carrot Cake", "Chilli Oil", "Cold Brew Batches", 
            "Feta", "Fresh Mozzarella", "Hot Sauce", "House Tomato Sauce", "Lavender Syrup", 
            "Mushroom Sauce", "Pesto", "Pizza Dough", "Roasted Espresso Blend", "Rose Cake", 
            "Rose Syrup", "Saffron Syrup", "Simple Syrup", "Vodka Sauce"
        ];

        const targetSelect = document.getElementById('recipe-target');
        PREPPED_ITEMS.sort().forEach(item => { 
            targetSelect.innerHTML += `<option value="${item}">${item}</option>`; 
        });

        window.addIngredientRow = function(selectedItem = "", qty = "") {
            const list = document.getElementById('ingredient-list');
            const row = document.createElement('div');
            row.className = 'row-group';
            row.style.marginBottom = '10px';
            
            let optionsHtml = '<option value="" disabled selected>Select Raw Item...</option>';
            RAW_ITEMS.sort().forEach(item => {
                optionsHtml += `<option value="${item}" ${selectedItem === item ? 'selected' : ''}>${item}</option>`;
            });

            row.innerHTML = `
                <select class="remark-input ing-name" style="flex: 2; margin: 0; padding: 12px;">${optionsHtml}</select>
                <input type="number" class="remark-input ing-qty" placeholder="Qty" value="${qty}" style="flex: 1; margin: 0; padding: 12px;">
                <button class="btn-action" style="height: 44px; width: 44px;" onclick="this.parentElement.remove()">✖</button>
            `;
            list.appendChild(row);
        };

        window.saveRecipe = function() {
            const target = document.getElementById('recipe-target').value;
            const rows = document.querySelectorAll('#ingredient-list .row-group');
            let recipeData = {};
            
            rows.forEach(row => {
                const name = row.querySelector('.ing-name').value;
                const qty = parseFloat(row.querySelector('.ing-qty').value);
                if (name && !isNaN(qty)) { recipeData[name] = qty; }
            });

            if (Object.keys(recipeData).length === 0) {
                return alert("Please add at least one valid ingredient with a quantity.");
            }

            db.ref('inventory/recipes/' + target).set(recipeData).then(() => {
                alert(`Success: ${target} recipe is locked into the database.`);
            }).catch(e => {
                alert("Error saving recipe: " + e.message);
            });
        };

        window.loadExistingRecipe = function() {
            const target = document.getElementById('recipe-target').value;
            const list = document.getElementById('ingredient-list');
            list.innerHTML = ""; 
            
            db.ref('inventory/recipes/' + target).once('value', snap => {
                if (snap.exists()) {
                    const recipe = snap.val();
                    for (let ing in recipe) { addIngredientRow(ing, recipe[ing]); }
                } else {
                    addIngredientRow(); 
                }
            });
        };

        // Load the first recipe on boot
        setTimeout(() => { loadExistingRecipe(); }, 500);
    </script>
</body>
</html>
