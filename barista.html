<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>ILA | Barista Display</title>
    <link rel="apple-touch-icon" href="/icon-barista.png" />
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;700&display=swap" rel="stylesheet">

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

    <style>
        :root { --brand-bg: #8D6E52; --brand-text: #ffffff; }
        body { background-color: var(--brand-bg); color: var(--brand-text); font-family: 'Quicksand', sans-serif; margin: 0; padding: 0; line-height: 1.6; }
        header { text-align: center; padding: 20px 0; border-bottom: 1px solid rgba(255,255,255,0.2); margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; padding: 20px 5%;}
        .logo { max-width: 150px; height: auto; display: block; }
        .header-title { font-size: 1.2rem; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; margin: 0;}
        .clock { font-size: 1.2rem; font-weight: bold; opacity: 0.8; }
        .kds-container { padding: 0 5%; display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; align-items: start; padding-bottom: 50px;}
        .ticket-card { background: rgba(0, 0, 0, 0.15); border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 12px; padding: 20px; display: flex; flex-direction: column; animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .ticket-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px dashed rgba(255,255,255,0.3); padding-bottom: 15px; margin-bottom: 15px; }
        .ticket-dest { font-size: 1.6rem; font-weight: 700; text-transform: uppercase; line-height: 1; }
        .ticket-meta { text-align: right; font-size: 0.85rem; opacity: 0.8; text-transform: uppercase; letter-spacing: 1px;}
        .ticket-time { font-size: 1.1rem; font-weight: bold; display: block; margin-bottom: 2px; color: #fff;}
        .ticket-items { flex-grow: 1; margin-bottom: 20px; }
        .item-row { display: flex; font-size: 1.3rem; margin-bottom: 10px; font-weight: 500; line-height: 1.3; align-items: flex-start;}
        .item-qty { font-weight: 700; width: 35px; flex-shrink: 0; }
        .item-name { flex-grow: 1; }
        .ticket-notes { background: rgba(255, 204, 0, 0.1); border-left: 3px solid #ffcc00; padding: 10px; margin-bottom: 20px; font-size: 0.95rem; color: #ffcc00; font-style: italic; border-radius: 0 4px 4px 0;}
        .btn-done { background-color: var(--brand-text); color: var(--brand-bg); border: none; padding: 15px; border-radius: 8px; font-weight: 700; font-size: 1.2rem; cursor: pointer; font-family: 'Quicksand', sans-serif; width: 100%; text-transform: uppercase; letter-spacing: 2px; transition: opacity 0.2s;}
        .btn-done:active { opacity: 0.7; }
        .empty-state { text-align: center; grid-column: 1 / -1; margin-top: 50px; opacity: 0.5; }
        .empty-state h2 { font-size: 2rem; text-transform: uppercase; letter-spacing: 4px; margin-bottom: 5px; }
        #login-overlay { position: fixed; inset: 0; background: var(--brand-bg); z-index: 99999; display: flex; align-items: center; justify-content: center; padding: 20px; }
        #login-overlay.hidden { display: none; }
        #login-box { width: 100%; max-width: 320px; text-align: center; }
        #login-box h2 { letter-spacing: 3px; text-transform: uppercase; font-weight: 700; margin-bottom: 25px; }
        #login-box input { width: 100%; padding: 14px; margin: 8px 0; border-radius: 8px; border: 1px solid rgba(255,255,255,0.4); background: transparent; color: #fff; font-family: 'Quicksand', sans-serif; font-size: 1rem; box-sizing: border-box; outline: none; }
        #login-box button { width: 100%; padding: 14px; margin-top: 16px; border: none; border-radius: 8px; background: #fff; color: var(--brand-bg); font-weight: 700; font-size: 1.1rem; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; font-family: 'Quicksand', sans-serif; }
        #login-error { color: #ffcfcf; font-size: 0.9rem; margin-top: 12px; min-height: 1.2em; }
        .ticket-elapsed { font-weight: bold; }
        .ticket-card.overdue { border-color: #ff4d4d; background: rgba(255, 77, 77, 0.15); animation: kdsPulse 1.2s infinite; }
        .ticket-card.overdue .ticket-elapsed { color: #ff6b6b; }
        @keyframes kdsPulse { 0%, 100% { box-shadow: 0 0 0 0 rgba(255,77,77,0.5); } 50% { box-shadow: 0 0 0 7px rgba(255,77,77,0); } }
    </style>
</head>
<body>
    <div id="login-overlay">
        <div id="login-box">
            <h2>Bar Display</h2>
            <input type="email" id="login-email" placeholder="Email" autocomplete="username">
            <input type="password" id="login-password" placeholder="Password" autocomplete="current-password">
            <button onclick="window.signInDisplay()">Sign In</button>
            <div id="login-error"></div>
        </div>
    </div>

    <header>
        <img src="logo.png" alt="ILA Logo" class="logo">
        <h1 class="header-title">Barista Display</h1>
        <div class="clock" id="live-clock">00:00</div>
    </header>

    <div class="kds-container" id="ticket-board">
        <div class="empty-state">
            <h2>No Orders</h2>
            <p>Waiting for tickets...</p>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAgUmy9NjbDnYXX_TBBjF8-qj36aW21qsQ",
            authDomain: "ila-cafe.firebaseapp.com",
            databaseURL: "https://ila-cafe-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "ila-cafe",
            storageBucket: "ila-cafe.firebasestorage.app",
            messagingSenderId: "473595092965",
            appId: "1:473595092965:web:4ba6243e67b9ed0adb990c"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();
        let displayStarted = false;

        function escapeHTML(str) {
            return String(str == null ? "" : str).replace(/[&<>"']/g, c => ({
                '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
            }[c]));
        }
        function showLogin(msg) { document.getElementById('login-overlay').classList.remove('hidden'); if (msg) document.getElementById('login-error').innerText = msg; }
        function hideLogin() { document.getElementById('login-overlay').classList.add('hidden'); document.getElementById('login-error').innerText = ""; }
        window.signInDisplay = function() {
            const email = document.getElementById('login-email').value.trim();
            const pw = document.getElementById('login-password').value;
            document.getElementById('login-error').innerText = "Signing in...";
            auth.signInWithEmailAndPassword(email, pw).catch(() => { document.getElementById('login-error').innerText = "Sign-in failed. Check email and password."; });
        };

        // ===== overdue-order detection =====
        const KDS_SLA_MIN = 20;            // station service-time limit, in minutes
        window.kdsTickets = {};                 // id -> { start, qty }
        window.kdsAlarmed = {};                 // id -> true (already beeped)
        const KDS_STATION = 'barista';
        const ALERT_WORKER_URL = 'https://ila-push.sraveen-chirania.workers.dev/';
        const ALERT_SECRET = '60765ac4763b2df758331f5dea3a145862078c27b72d3efb';
        async function kdsPushAlert(id, t){
            if (!ALERT_WORKER_URL) return;
            try {
                const res = await db.ref('orders/active/' + KDS_STATION + '/' + id).transaction(function(cur){ if (!cur) return cur; if (cur.pushedAt) return; cur.pushedAt = Date.now(); return cur; });
                if (!(res.committed && res.snapshot.exists())) return;
                const snap = await db.ref('pushSubscriptions').once('value');
                const subscriptions = Object.values(snap.val() || {}).map(function(x){ return x && x.subscription; }).filter(Boolean);
                if (!subscriptions.length) return;
                const mins = Math.floor((Date.now() - t.start) / 60000);
                const body = (t.dest ? t.dest + ' \u00b7 ' : '') + (t.summary ? t.summary + ' \u00b7 ' : '') + mins + 'm late';
                await fetch(ALERT_WORKER_URL, { method: 'POST', headers: { 'Content-Type': 'text/plain' }, body: JSON.stringify({ secret: ALERT_SECRET, notification: { title: '\u23f0 Order overdue', body: body, tag: 'late-' + id, url: '/admin.html' }, subscriptions: subscriptions }) });
            } catch (e) { console.error('push alert failed', e); }
        }
        // ===== SMART overdue threshold — fires relative to THIS drink order's realistic prep time =====
        // Drinks have NO oven; uses the barista saturation curve. Alarm = expected prep + PER-CATEGORY margin.
        window.etaModel = null;
        try { db.ref('eta/model').on('value', s => { const m=s.val(); if(m && m.itemBase) window.etaModel = m; }); } catch(e){}
        window.kdsLoadBarista = 0;
        try { db.ref('orders/active/barista').on('value', s => { window.kdsLoadBarista = s.numChildren(); }); } catch(e){}
        const KDS_ETA_DEF = {
            itemBase:{"espresso":3.6,"cortado":3.8,"americano":4.0,"iced americano":4.5,"cappuccino (large)":6.3,"cappuccino":5.3,"iced latte (large)":6.3,"iced latte":5.2,"latte":5.8,"flat white":6.5,"matcha":8.0,"iced matcha":8.5,"tea pot":4.4,"iced tea":5.2,"cold brew":4.0,"carrot cake":3.0,"banana bread":2.8,"rose cake":2.9},
            fallback:{pizza:7.5,hotfood:8.0,drink:5.5,baked:3.1},
            pizzaKeys:["margherita","funghi","burrata","formaggi","marc","pizza","fav","quattro","vodka"],
            bakedKeys:["cake","bread","banana"],
            satCurveBarista:[[0,0],[1,0],[3,4],[6,5],[7,8]],
            qtyCurve:[[1,0],[2,4],[4,9],[5,15]]
        };
        function etaCfg(){ return window.etaModel || KDS_ETA_DEF; }
        function etaInterp(c,x){ if(!c||!c.length)return 0; if(x<=c[0][0])return c[0][1]; if(x>=c[c.length-1][0])return c[c.length-1][1]; for(let i=1;i<c.length;i++){ if(x<=c[i][0]){ const[a,b]=c[i-1],[d,e]=c[i]; return b+(e-b)*(x-a)/(d-a);} } return c[c.length-1][1]; }
        function etaItemBase(name){ const M=etaCfg(), n=(name||'').toLowerCase(); let best=null,bl=-1; for(const k in M.itemBase){ if(n.includes(k)&&k.length>bl){best=M.itemBase[k];bl=k.length;} } if(best!=null)return best; if(M.bakedKeys.some(k=>n.includes(k)))return M.fallback.baked; return M.fallback.drink; }
        function kdsExpectedPrep(items){
            const M=etaCfg();
            let base=0, qty=0;
            for(const nm in (items||{})){ const q=parseInt(items[nm].qty)||1; const b=etaItemBase(nm); if(b>base)base=b; qty+=q; }
            if(base===0&&qty===0) return null;
            let t=base + etaInterp(M.qtyCurve,qty);
            t += etaInterp(M.satCurveBarista, window.kdsLoadBarista||0);   // no oven term for drinks
            return t;
        }
        function kdsThresholdMs(qty, items){
            const exp = items ? kdsExpectedPrep(items) : null;
            if (exp != null) {
                const M=etaCfg(); let allBaked=true;
                for(const nm in (items||{})){ if(!M.bakedKeys.some(k=>nm.toLowerCase().includes(k))) allBaked=false; }
                const margin = allBaked ? 3 : 7;   // dessert p95 spread vs drink p95 spread
                return (exp + margin) * 60000;
            }
            return (20 + Math.min(Math.max(0, (qty||1) - 2) * 5, 20)) * 60000;  // fallback
        }
        function kdsQty(order){ let q = 0; if (order && order.items) { for (const k in order.items) { q += (parseInt(order.items[k].qty) || 0); } } return q || 1; }
        function kdsTicketStart(order){
            if (order && typeof order.createdAt === 'number') return order.createdAt;
            if (order && order.time) { const m = String(order.time).match(/(\d{1,2}):(\d{2})\s*([ap])m?/i); if (m) { const d = new Date(); let h = +m[1]; if (m[3]) { h = h % 12; if (/p/i.test(m[3])) h += 12; } d.setHours(h, +m[2], 0, 0); if (d.getTime() - Date.now() > 60000) d.setDate(d.getDate() - 1); return d.getTime(); } }
            return null;
        }
        function kdsBeep(){ try { const a = new (window.AudioContext || window.webkitAudioContext)(); const o = a.createOscillator(), g = a.createGain(); o.connect(g); g.connect(a.destination); o.type = 'square'; o.frequency.value = 880; g.gain.setValueAtTime(0.0001, a.currentTime); g.gain.exponentialRampToValueAtTime(0.35, a.currentTime + 0.02); g.gain.exponentialRampToValueAtTime(0.0001, a.currentTime + 0.6); o.start(); o.stop(a.currentTime + 0.62); } catch (e) {} }
        function kdsCheckOverdue(){
            const now = Date.now();
            for (const id in window.kdsTickets) {
                const t = window.kdsTickets[id]; if (!t || !t.start) continue;
                const age = now - t.start, over = age > kdsThresholdMs(t.qty, t.items), mins = Math.floor(age / 60000);
                const card = document.getElementById('ticket-' + id), el = document.getElementById('elapsed-' + id);
                if (el) {
                    if (t._expM == null) { const e = kdsExpectedPrep(t.items); t._expM = (e!=null) ? Math.round(e) : null; }
                    el.innerText = mins + 'm' + (t._expM!=null ? ' / ~' + t._expM + 'm' : '');
                }
                if (card) { if (over) card.classList.add('overdue'); else card.classList.remove('overdue'); }
                if (over && !window.kdsAlarmed[id]) { window.kdsAlarmed[id] = true; kdsBeep(); kdsPushAlert(id, t); }
            }
        }
        setInterval(() => {
            document.getElementById('live-clock').innerText = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            kdsCheckOverdue();
        }, 1000);

        auth.onAuthStateChanged(async (user) => {
            if (!user) { showLogin(); return; }
            try {
                const prof = (await db.ref('users/' + user.uid).once('value')).val();
                if (!prof || !prof.role) { await auth.signOut(); showLogin("This account has no access."); return; }
                hideLogin();
                if (!displayStarted) { displayStarted = true; startDisplay(); }
            } catch (e) { showLogin("Could not verify access. Check connection and retry."); }
        });

        function startDisplay() {
            db.ref('orders/active/barista').on('value', snap => {
                const orders = snap.val();
                const board = document.getElementById('ticket-board');
                board.innerHTML = "";
                window.kdsTickets = {};
                if (!orders) {
                    board.innerHTML = `<div class="empty-state"><h2>No Orders</h2><p>Waiting for tickets...</p></div>`;
                    window.kdsAlarmed = {};
                    return;
                }
                for (let id in orders) {
                    const order = orders[id];
                    let itemsHTML = "";
                    if (order.items) {
                        for (let itemName in order.items) {
                            itemsHTML += `<div class="item-row"><span class="item-qty">${escapeHTML(order.items[itemName].qty)}x</span><span class="item-name">${escapeHTML(itemName)}</span></div>`;
                        }
                    }
                    let notesHTML = order.notes ? `<div class="ticket-notes">Notes: ${escapeHTML(order.notes)}</div>` : "";
                    board.innerHTML += `<div class="ticket-card" id="ticket-${id}"><div class="ticket-header"><div class="ticket-dest">${escapeHTML(order.destination)}</div><div class="ticket-meta"><span class="ticket-time">${escapeHTML(order.time)}</span><span>${escapeHTML(order.source)} &middot; <span class="ticket-elapsed" id="elapsed-${id}"></span></span></div></div><div class="ticket-items">${itemsHTML}</div>${notesHTML}<button class="btn-done" onclick="markOrderDone('${id}')">DONE</button></div>`;
                    window.kdsTickets[id] = { start: kdsTicketStart(order), qty: kdsQty(order), dest: order.destination || '', items: order.items || {}, summary: order.items ? Object.keys(order.items).map(function(k){ return order.items[k].qty + '\u00d7 ' + k; }).join(', ') : '' };
                }
                for (const aid in window.kdsAlarmed) { if (!(aid in window.kdsTickets)) delete window.kdsAlarmed[aid]; }
                kdsCheckOverdue();
            });
        }

        window.markOrderDone = function(id) {
            db.ref('orders/active/barista/' + id).once('value').then(snapshot => {
                const order = snapshot.val();
                if (!order) return;
                let summaryList = [];
                if(order.items) { for(let item in order.items) { summaryList.push(`${order.items[item].qty}x ${item}`); } }
                let summaryString = summaryList.join(", ");
                const readySignal = {
                    table: order.destination,
                    items: summaryString,
                    time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}),
                    timestamp: Date.now()
                };
                db.ref('orders/ready').push(readySignal);
                db.ref('orders/completed/barista/' + id).set({ ...order, completedAt: Date.now() });
                // mark track ready only when ALL stations for this order are done (handles split orders)
                if (order.trackId) {
                    try {
                        const tref = db.ref('orders/track/' + order.trackId);
                        tref.transaction(function(cur){
                            if(!cur) return cur;
                            cur.stationsDone = (cur.stationsDone||0) + 1;
                            if(cur.stationsDone >= (cur.stations||1)){ cur.status='ready'; cur.readyAt=Date.now(); }
                            return cur;
                        });
                    } catch(e){}
                }
                const ticket = document.getElementById('ticket-' + id);
                if(ticket) { ticket.style.opacity = '0'; ticket.style.transform = 'scale(0.95)'; ticket.style.transition = 'all 0.2s'; }
                setTimeout(() => { db.ref('orders/active/barista/' + id).remove(); }, 200);
            });
        };
    </script>
</body>
</html>
